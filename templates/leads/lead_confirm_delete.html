<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete {{ lead.name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center text-slate-800">
    <div class="max-w-md w-full mx-6 rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
        <h1 class="text-lg font-bold text-slate-900 mb-2">Delete lead?</h1>
        <p class="text-sm text-slate-600 mb-6">
            Are you sure you want to permanently delete <strong>{{ lead.name }}</strong>? This cannot be undone.
        </p>

        <form method="post" action="{% url 'leads:delete' lead.pk %}{% if filter_qs %}?{{ filter_qs }}{% endif %}" class="flex gap-3">
            {% csrf_token %}
            <button type="submit" class="rounded-lg bg-red-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-red-700 transition">Yes, delete</button>
            <a href="{% url 'leads:detail' lead.pk %}{% if detail_qs %}?{{ detail_qs }}{% endif %}">
                <button type="button" class="rounded-lg border border-slate-300 px-5 py-2.5 text-sm font-semibold text-slate-700 hover:bg-slate-50 transition">Cancel</button>
            </a>
        </form>
    </div>
</body>
</html>
