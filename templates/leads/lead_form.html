<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Lead</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">
    <div class="max-w-2xl mx-auto px-6 py-8">
        <a class="inline-flex items-center gap-1 text-sm font-medium text-indigo-600 hover:text-indigo-800 mb-4" href="{% url 'leads:list' %}">&larr; Back to leads</a>
        <h1 class="text-2xl font-bold text-slate-900 mb-6">Add Sales Lead</h1>

        {% if errors %}
            <div class="mb-6 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
                {% for error in errors %}<div>{{ error }}</div>{% endfor %}
            </div>
        {% endif %}

        <form method="post" class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm space-y-4">
            {% csrf_token %}
            <div>
                <label for="name" class="block text-sm font-medium text-slate-700 mb-1">Name *</label>
                <input type="text" name="name" id="name" value="{{ form_data.name }}" required
                       class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
            </div>
            <div>
                <label for="address" class="block text-sm font-medium text-slate-700 mb-1">Address</label>
                <input type="text" name="address" id="address" value="{{ form_data.address }}"
                       class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div>
                    <label for="city" class="block text-sm font-medium text-slate-700 mb-1">City</label>
                    <input type="text" name="city" id="city" value="{{ form_data.city }}"
                           class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                </div>
                <div>
                    <label for="state" class="block text-sm font-medium text-slate-700 mb-1">State</label>
                    <input type="text" name="state" id="state" value="{{ form_data.state }}"
                           class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                </div>
                <div>
                    <label for="zip" class="block text-sm font-medium text-slate-700 mb-1">Zip</label>
                    <input type="text" name="zip" id="zip" value="{{ form_data.zip }}"
                           class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                </div>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label for="phone" class="block text-sm font-medium text-slate-700 mb-1">Phone</label>
                    <input type="text" name="phone" id="phone" value="{{ form_data.phone }}"
                           class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                </div>
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                    <input type="email" name="email" id="email" value="{{ form_data.email }}"
                           class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                </div>
            </div>
            <div>
                <label for="url" class="block text-sm font-medium text-slate-700 mb-1">Website</label>
                <input type="url" name="url" id="url" value="{{ form_data.url }}"
                       class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
            </div>
            <div>
                <label for="primary_category_name" class="block text-sm font-medium text-slate-700 mb-1">Category</label>
                <input type="text" name="primary_category_name" id="primary_category_name" value="{{ form_data.primary_category_name }}"
                       class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
            </div>
            <div>
                <label for="status" class="block text-sm font-medium text-slate-700 mb-1">Status</label>
                <select name="status" id="status" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                    {% for value, label in status_choices %}
                        <option value="{{ value }}" {% if value == form_data.status %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="conversion_rating" class="block text-sm font-medium text-slate-700 mb-1">Lead Rating</label>
                <select name="conversion_rating" id="conversion_rating" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                    {% for value, label in rating_choices %}
                        <option value="{{ value }}" {% if value == form_data.conversion_rating %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="notes" class="block text-sm font-medium text-slate-700 mb-1">Notes</label>
                <textarea name="notes" id="notes" rows="3" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">{{ form_data.notes }}</textarea>
            </div>
            <button type="submit" class="rounded-lg bg-indigo-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-indigo-700 transition">Create lead</button>
        </form>
    </div>
</body>
</html>
